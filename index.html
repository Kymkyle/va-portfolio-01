<!Doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VA Portfolio</title>
    <link rel="stylesheet" type="text/css" href="kyoungvaportfolio.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  </head>
  <body oncontextmenu="return false;">
    <!-- PRELOADER -->
    <div id="preloader">Loading...</div>
    <div class="main-content">
      <div class="background-container">
        <img src="/VAPORTFOLIO/VA IMAGES/computer/computer8.jpg" class="overlay-image" alt="Overlay Image">
      </div>
      <div class="top-header">
        <h2 class="subtitle" onclick="window.location.href='index.html'">Home</h2>
        <h2 class="subtitle" onclick="window.location.href='about-me.html'">About Me</h2>
        <h2 class="subtitle" onclick="window.location.href='skills.html'">Skills</h2>
        <h2 class="subtitle" onclick="window.location.href='blog.html'">Blog</h2>
        <h2 class="subtitle" onclick="window.location.href='get-in-touch.html'">Get in Touch</h2>
      </div>
      <div class="main-header">
        <h1 class="title">Karen  Young</h1>
        <h1 class="title-1">Front-end Developer, Virtual Admin Assistant and Creative Support Specialist</h1>
      <div class="tagline"> "Streamline your business at your fingertips. Building strong, lasting relationships that drive your company’s growth—virtually."</div>
    </div>
    <script>
        // Disable image dragging
        document.querySelectorAll('img, svg').forEach(el => {
            el.setAttribute('draggable', 'false');
        });
        
        // Block dev tools and view-source shortcuts
        document.addEventListener('keydown', function (e) {
            if (
                e.ctrlKey && (e.key === 'u' || e.key === 'U') || // Ctrl+U
                e.key === 'F12' ||                               // F12
                (e.ctrlKey && e.shiftKey && ['I', 'C', 'J'].includes(e.key.toUpperCase()))
            ) {
                e.preventDefault();
            }
        });
        // Preloader fade out and reveal main content on page load
        window.addEventListener("load", function () {
            const preloader = document.getElementById("preloader");
            const mainContent = document.querySelector(".main-content");

            preloader.classList.add("fade-out");

            setTimeout(() => {
                preloader.style.display = "none";
                mainContent.style.visibility = "visible";
            }, 500);
        });
    </script> 
  </body>
</html>
